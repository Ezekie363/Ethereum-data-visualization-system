<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>以太坊链上数据分析与可视化系统</title>
  <link rel="stylesheet" href="dashboard/styles.css?v=20260316a">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <p class="brand-tag" data-i18n="brand_tag"></p>
        <h1 data-i18n="project_name"></h1>
        <p class="brand-desc" data-i18n="project_desc"></p>
      </div>

      <div class="control-panel">
        <div class="control-group">
          <label for="networkSelect" data-i18n="label_network"></label>
          <select id="networkSelect">
            <option value="ethereum">Ethereum Mainnet</option>
          </select>
        </div>

        <div class="control-group">
          <label for="timeRangeSelect" data-i18n="label_time_range"></label>
          <select id="timeRangeSelect">
            <option value="7">7</option>
            <option value="30" selected>30</option>
            <option value="90">90</option>
          </select>
        </div>

        <div class="control-group">
          <label for="languageSelect" data-i18n="label_language"></label>
          <select id="languageSelect">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>

        <button id="refreshButton" class="refresh-button" type="button" data-i18n="button_refresh"></button>
      </div>

      <div class="api-panel">
        <h2 data-i18n="api_panel_title"></h2>
        <p class="api-desc" data-i18n="api_panel_desc"></p>
        <ul class="api-list">
          <li><code id="datasetPathSummary">data/ethereum/30/meta.csv</code></li>
          <li><code id="dailyFileHint">data/ethereum/30/daily_metrics.csv</code></li>
          <li><code id="distributionFileHint">data/ethereum/30/amount_distribution.csv</code></li>
          <li><code id="whaleFileHint">data/ethereum/30/whale_ranking.csv</code></li>
        </ul>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div>
          <h2 data-i18n="dashboard_title"></h2>
          <p id="lastUpdatedText" class="header-meta"></p>
        </div>
        <div id="dataSourceBadge" class="data-source-badge"></div>
      </header>

      <section class="kpi-grid">
        <article class="kpi-card">
          <h3 data-i18n="kpi_active_addresses"></h3>
          <p id="kpiActiveAddresses" class="kpi-value">-</p>
          <p id="kpiActiveAddressesChange" class="kpi-change">-</p>
          <p class="kpi-formula" data-i18n="formula_active_addresses"></p>
        </article>

        <article class="kpi-card">
          <h3 data-i18n="kpi_avg_gas"></h3>
          <p id="kpiAvgGas" class="kpi-value">-</p>
          <p id="kpiAvgGasChange" class="kpi-change">-</p>
          <p class="kpi-formula" data-i18n="formula_gas"></p>
        </article>

        <article class="kpi-card">
          <h3 data-i18n="kpi_erc20_total"></h3>
          <p id="kpiErc20Total" class="kpi-value">-</p>
          <p id="kpiErc20Mean" class="kpi-change">-</p>
          <p class="kpi-formula" data-i18n="formula_erc20"></p>
        </article>

        <article class="kpi-card">
          <h3 data-i18n="kpi_whale_netflow"></h3>
          <p id="kpiWhaleNetflow" class="kpi-value">-</p>
          <p id="kpiWhaleRatio" class="kpi-change">-</p>
          <p class="kpi-formula" data-i18n="formula_whale"></p>
        </article>
      </section>

      <section class="chart-grid">
        <article class="chart-card chart-card-large">
          <h3 data-i18n="chart_active_addresses_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_active_addresses_subtitle"></p>
          <div id="chartActiveAddresses" class="chart"></div>
        </article>

        <article class="chart-card">
          <h3 data-i18n="chart_gas_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_gas_subtitle"></p>
          <div id="chartGasTrend" class="chart"></div>
        </article>

        <article class="chart-card">
          <h3 data-i18n="chart_erc20_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_erc20_subtitle"></p>
          <div id="chartErc20Transfers" class="chart"></div>
        </article>

        <article class="chart-card">
          <h3 data-i18n="chart_whale_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_whale_subtitle"></p>
          <div id="chartWhaleNetflow" class="chart"></div>
        </article>

        <article class="chart-card">
          <h3 data-i18n="chart_distribution_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_distribution_subtitle"></p>
          <div id="chartAmountDistribution" class="chart"></div>
        </article>
      </section>

      <section class="insight-grid">
        <article class="chart-card">
          <h3 data-i18n="chart_distribution_ratio_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_distribution_ratio_subtitle"></p>
          <div id="chartDistributionPie" class="chart chart-pie"></div>
        </article>

        <article class="chart-card">
          <h3 data-i18n="chart_whale_flow_ratio_title"></h3>
          <p class="chart-subtitle" data-i18n="chart_whale_flow_ratio_subtitle"></p>
          <div id="chartWhaleFlowPie" class="chart chart-pie"></div>
        </article>
      </section>

      <section class="table-section">
        <article class="table-card">
          <h3 data-i18n="table_title"></h3>
          <table>
            <thead>
              <tr>
                <th data-i18n="table_col_rank"></th>
                <th data-i18n="table_col_address"></th>
                <th data-i18n="table_col_inflow"></th>
                <th data-i18n="table_col_outflow"></th>
                <th data-i18n="table_col_netflow"></th>
              </tr>
            </thead>
            <tbody id="whaleTableBody"></tbody>
          </table>
        </article>
      </section>

      <section class="method-section">
        <article class="method-card">
          <h3 data-i18n="method_title"></h3>
          <table class="method-table">
            <thead>
              <tr>
                <th data-i18n="method_col_indicator"></th>
                <th data-i18n="method_col_formula"></th>
                <th data-i18n="method_col_source"></th>
                <th data-i18n="method_col_interpretation"></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td data-i18n="method_row_active_indicator"></td>
                <td data-i18n="method_row_active_formula"></td>
                <td data-i18n="method_row_active_source"></td>
                <td data-i18n="method_row_active_interpretation"></td>
              </tr>
              <tr>
                <td data-i18n="method_row_gas_indicator"></td>
                <td data-i18n="method_row_gas_formula"></td>
                <td data-i18n="method_row_gas_source"></td>
                <td data-i18n="method_row_gas_interpretation"></td>
              </tr>
              <tr>
                <td data-i18n="method_row_erc20_indicator"></td>
                <td data-i18n="method_row_erc20_formula"></td>
                <td data-i18n="method_row_erc20_source"></td>
                <td data-i18n="method_row_erc20_interpretation"></td>
              </tr>
              <tr>
                <td data-i18n="method_row_whale_indicator"></td>
                <td data-i18n="method_row_whale_formula"></td>
                <td data-i18n="method_row_whale_source"></td>
                <td data-i18n="method_row_whale_interpretation"></td>
              </tr>
              <tr>
                <td data-i18n="method_row_amount_indicator"></td>
                <td data-i18n="method_row_amount_formula"></td>
                <td data-i18n="method_row_amount_source"></td>
                <td data-i18n="method_row_amount_interpretation"></td>
              </tr>
              <tr>
                <td data-i18n="method_row_amount_pie_indicator"></td>
                <td data-i18n="method_row_amount_pie_formula"></td>
                <td data-i18n="method_row_amount_pie_source"></td>
                <td data-i18n="method_row_amount_pie_interpretation"></td>
              </tr>
              <tr>
                <td data-i18n="method_row_whale_pie_indicator"></td>
                <td data-i18n="method_row_whale_pie_formula"></td>
                <td data-i18n="method_row_whale_pie_source"></td>
                <td data-i18n="method_row_whale_pie_interpretation"></td>
              </tr>
            </tbody>
          </table>
        </article>
      </section>
    </main>
  </div>

  <script src="dashboard/app.js?v=20260316a"></script>
</body>
</html>
